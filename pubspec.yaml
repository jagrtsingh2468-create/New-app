name: voice_changer_app
description: "Study Chaos Voice Changer - record, transform, and share your voice."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ---- State management ----
  provider: ^6.1.2                     # Simple, battle-tested state management

  # ---- Audio recording / playback ----
  record: ^5.1.2                       # Records microphone input to file (AAC/WAV)
  audioplayers: ^6.0.0                 # Plays processed audio, supports looping/seeking

  # ---- Audio effects processing ----
  ffmpeg_kit_flutter_new: ^1.6.0       # Maintained fork of ffmpeg_kit_flutter (original retired).
                                        # Used to apply pitch/speed/echo/reverb filters offline.

  # ---- File & permission handling ----
  permission_handler: ^11.3.1          # Runtime mic + storage permission requests
  path_provider: ^2.1.3                # App document / temp directory paths
  file_picker: ^8.0.6                  # Import existing audio files from device storage
  share_plus: ^9.0.0                   # Share processed audio to other apps
  path: ^1.9.0                         # Path joining/manipulation utilities

  # ---- Persistence ----
  shared_preferences: ^2.2.3           # Store theme preference + small settings
  uuid: ^4.4.0                         # Unique IDs for each recording

  # ---- UI / UX ----
  google_fonts: ^6.2.1                 # Custom typography for Material 3 UI
  lottie: ^3.1.2                       # Micro-animations (record pulse, success checks)
  intl: ^0.19.0                        # Date/time formatting for recording list

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0                # Recommended lint rules for clean code
  flutter_launcher_icons: ^0.13.1      # Generates real launcher icons from assets/icon/icon.png

# Config consumed by flutter_launcher_icons. Run:
#   flutter pub run flutter_launcher_icons
# any time you change assets/icon/icon.png, to regenerate every mipmap
# density/adaptive-icon variant Android needs.
flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/icon/icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#7C4DFF"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/icon/
